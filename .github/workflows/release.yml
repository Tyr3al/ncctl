name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"

          for cmd in ncctl ncserver; do
            out="${cmd}-${VERSION}-${GOOS}-${GOARCH}${EXT}"
            go build -trimpath -ldflags="-s -w" -o "dist/${out}" "./cmd/${cmd}"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          retention-days: 7

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: dist/
          merge-multiple: true

      - name: Create checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Extract changelog section
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_BARE="${VERSION#v}"
          # Use index() for plain-string matching to avoid regex issues with dots and brackets
          awk -v ver="## [${VERSION_BARE}]" \
            'index($0, ver) == 1 {found=1; next} found && /^## \[/{exit} found && /^\[.*\]:/{exit} found{print}' \
            CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "See [CHANGELOG.md](CHANGELOG.md) for details." > release-notes.md
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          body_path: release-notes.md
          files: |
            dist/*
